<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MenuForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
.wrap{display:flexn:column;align-items:center;gap:28px}
.label{color:#e8ff47;font-size:11px;letter-spacing:6px;text-transform:uppercase}
.dots{display:flex;gap:14px}
.dot{width:12px;height:12px;border-radius:50%;background:#1a1a1a;border:1px solid #333;transition:background 0.15s}
.dot.on{background:#e8ff47}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
button{width:70px;height:70px;background:#141418;border:1px solid #2a2a35;border-radius:10px;color:#f0f0f0;font-size:22px;cursor:pointer;font-family:inherit}
button.empty{background:transparent;border:none;cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.shake{animation:shake 0.5s ease}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">MenuForge</div>
  <div class="dots" id="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="keypad">
    <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
    <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
    <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
    <button class="empty"></button><button onclick="press('0')">0</button><button onclick="del()">⌫</button>
  </div>
</div>
<script>
var PIN='6009',input='';
var dots=document.querySelectorAll('.dot');
function updateDots(){dots.forEach(function(d,i){d.classList.toggle('on',i<input.length);})}
function press(d){
  if(input.length>=4)return;
  input+=d; updateDots();
  if(input.length===4){
    if(input===PIN){window.location.href='/menuforge-app.html';}
    else{
      document.getElementById('dots').classList.add('shake');
      setTimeout(function(){document.getElementById('dots').classList.remove('shake');input='';updateDots();},600);
    }
  }
}
function del(){input=input.slice(0,-1);updateDots();}
</script>
</body>
</html>
